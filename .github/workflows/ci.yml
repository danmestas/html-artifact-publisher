name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Wrangler types
        run: npm run types

      - name: TypeScript no-emit
        run: npm run typecheck
